<!DOCTYPE html>
<html>
<head>
    <title>Hotel Booking</title>

    <style>
        body{
            font-family:Arial;
            background:#f2f2f2;
        }

        .container{
            width:400px;
            margin:50px auto;
            background:white;
            padding:20px;
            border-radius:10px;
            box-shadow:0 0 10px gray;
        }

        h2{
            text-align:center;
            color:#0066cc;
        }

        input,select{
            width:100%;
            padding:10px;
            margin:8px 0;
        }

        button{
            width:100%;
            padding:10px;
            background:#0066cc;
            color:white;
            border:none;
            cursor:pointer;
        }

        .msg{
            margin-top:20px;
            color:green;
            font-weight:bold;
            text-align:center;
        }
    </style>

</head>

<body>

<div class="container">

<h2>🏨 Hotel Booking</h2>

<form method="POST">

<input
type="text"
name="name"
placeholder="Enter Name"
required>

<select name="room">

<option>Single</option>

<option>Double</option>

<option>Deluxe</option>

</select>

<input
type="number"
name="days"
placeholder="Number of Days"
required>

<button type="submit">

Book Room

</button>

</form>

<div class="msg">

{{ message }}

</div>

</div>

</body>
</html>
